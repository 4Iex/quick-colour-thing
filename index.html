<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Spectrum Grid</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        grid-template-rows: repeat(5, 1fr);
        width: 100vw;
        height: 100vh;
    }

    .cell {
        position: relative;
        overflow: visible;
        transition: filter 0.3s ease;
        z-index: 1;
        will-change: transform;
    }

    .subgrid {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(2, 1fr);
        opacity: 0;
        transition: opacity 0.2s ease;
        z-index: 5;
    }

    .cell:hover .subgrid {
        opacity: 1;
    }

    .grid.dimmed .cell {
        filter: grayscale(100%);
    }

    .grid.dimmed .cell.active {
        filter: none;
    }

    .grid.dimmed .cell.active .subcell {
        filter: none;
    }

    .subcell {
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 10px;
        position: relative;
    }

    .subcell span {
        display: none;
        background: rgba(255,255,255,0.75);
        padding: 2px 4px;
        border-radius: 3px;
    }

    .subcell.show-hex span {
        display: block;
    }

    .palette-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 75vw;
        height: 75vh;
        background: #fff;
        display: none;
        grid-template-columns: repeat(5, 1fr);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        z-index: 100;
    }

    .palette-overlay.active {
        display: grid;
    }

    .close-btn {
        position: absolute;
        top: -15px;
        right: -15px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #000;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 200;
    }

    .palette-color {
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        cursor: pointer;
    }

    .controls {
        position: fixed;
        bottom: 10px;
        left: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        z-index: 200;
    }

    .history-item {
        display: flex;
        width: 120px;
        height: 20px;
        cursor: pointer;
    }

    .history-color {
        flex: 1;
    }
</style>
</head>
<body>

<div class="grid" id="grid"></div>
<div class="palette-overlay" id="palette"></div>
<div class="controls" id="history"></div>

<script>
const grid = document.getElementById('grid');
const palette = document.getElementById('palette');
const historyEl = document.getElementById('history');

let selectedColors = [];
let history = [];

function hslToHex(h, s, l) {
    s /= 100;
    l /= 100;
    const k = n => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = n => {
        const color = l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
        return Math.round(255 * color).toString(16).padStart(2, '0');
    };
    return `#${f(0)}${f(8)}${f(4)}`;
}

function clearAll() {
    selectedColors = [];
    document.querySelectorAll('.subcell').forEach(el => el.style.outline = 'none');
    palette.classList.remove('active');
}

function removeColor(color) {
    selectedColors = selectedColors.filter(c => c !== color);
    document.querySelectorAll('.subcell').forEach(el => {
        if (el.dataset.hex === color) el.style.outline = 'none';
    });
    palette.classList.remove('active');
}

function showPalette(fromHistory = false) {
    palette.innerHTML = '';

    const close = document.createElement('div');
    close.className = 'close-btn';
    close.textContent = '×';
    close.onclick = clearAll;
    palette.appendChild(close);

    selectedColors.forEach(color => {
        const div = document.createElement('div');
        div.className = 'palette-color';
        div.style.background = color;
        div.textContent = color;
        div.onclick = (e) => { e.stopPropagation(); removeColor(color); };
        palette.appendChild(div);
    });

    if (!fromHistory) {
        history.unshift([...selectedColors]);
        if (history.length > 5) history.pop();
        renderHistory();
    }

    palette.classList.add('active');
}

function renderHistory() {
    historyEl.innerHTML = '';

    history.forEach(set => {
        const row = document.createElement('div');
        row.className = 'history-item';

        row.onclick = (e) => {
            e.stopPropagation();
            selectedColors = [...set];
            showPalette(true);
        };

        set.forEach(color => {
            const c = document.createElement('div');
            c.className = 'history-color';
            c.style.background = color;
            row.appendChild(c);
        });

        historyEl.appendChild(row);
    });
}

function applyHover(cell) {
    const rect = cell.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const scale = 2;
    const w = rect.width;
    const h = rect.height;

    const centerX = rect.left + w / 2;
    const centerY = rect.top + h / 2;

    const newLeft = centerX - w * scale / 2;
    const newRight = centerX + w * scale / 2;
    const newTop = centerY - h * scale / 2;
    const newBottom = centerY + h * scale / 2;

    let shiftX = 0;
    let shiftY = 0;

    if (newLeft < 0) shiftX = -newLeft;
    if (newRight > vw) shiftX = vw - newRight;
    if (newTop < 0) shiftY = -newTop;
    if (newBottom > vh) shiftY = vh - newBottom;

    cell.style.transform = `translate(${shiftX}px, ${shiftY}px) scale(${scale})`;
    cell.style.zIndex = 10;
}

function resetHover(cell) {
    cell.style.transform = '';
    cell.style.zIndex = '';
}

const total = 50;

for (let i = 0; i < total; i++) {
    const hue = (i / total) * 360;

    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.background = `hsl(${hue},70%,50%)`;

    const subgrid = document.createElement('div');
    subgrid.className = 'subgrid';

    for (let j = 0; j < 8; j++) {
        const sub = document.createElement('div');
        sub.className = 'subcell';

        const lightness = 50 + (j - 3.5) * 5;
        const hex = hslToHex(hue, 70, lightness);

        sub.style.background = `hsl(${hue},70%,${lightness}%)`;
        sub.dataset.hex = hex;

        const label = document.createElement('span');
        label.textContent = hex;
        sub.appendChild(label);

        sub.onclick = (e) => {
            e.stopPropagation();
            sub.classList.toggle('show-hex');

            if (!selectedColors.includes(hex) && selectedColors.length < 5) {
                selectedColors.push(hex);
                sub.style.outline = '2px solid black';
            }

            if (selectedColors.length === 5) showPalette();
        };

        subgrid.appendChild(sub);
    }

    cell.appendChild(subgrid);

    cell.onmouseenter = () => {
        cell.classList.add('active');
        grid.classList.add('dimmed');
        applyHover(cell);
    };

    cell.onmouseleave = () => {
        cell.classList.remove('active');
        grid.classList.remove('dimmed');
        resetHover(cell);
    };

    grid.appendChild(cell);
}

document.addEventListener('click', (e) => {
    if (!palette.contains(e.target)) clearAll();
});
</script>

</body>
</html>
